# =============================================================================
# BudgetPilot API — Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d            # Start all services in background
#   docker compose down -v          # Stop and remove volumes (reset DB)
#   docker compose logs -f api      # Follow API logs
# =============================================================================

name: budgetpilot

services:

  # ===========================================================================
  # SQL Server 2022 — database engine
  # ===========================================================================
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: budgetpilot-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStr0ngPassw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStr0ngPassw0rd" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # Database initializer — runs sql_final.sql once, then exits
  # ===========================================================================
  db-setup:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: budgetpilot-db-setup
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    command: |
      bash -c '
        /opt/mssql-tools/bin/sqlcmd \
          -S db \
          -U sa \
          -P "YourStr0ngPassw0rd" \
          -d master \
          -C \
          -i /scripts/sql_final.sql \
        && echo "Database setup completed successfully."
      '

  # ===========================================================================
  # BudgetPilot API — ASP.NET Core 10.0
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budgetpilot-api
    restart: unless-stopped
    depends_on:
      db-setup:
        condition: service_completed_successfully
    ports:
      - "5253:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=BudgetPilot;User Id=sa;Password=YourStr0ngPassw0rd;TrustServerCertificate=True;"
      Jwt__Key: "REPLACE_ME_WITH_A_SECURE_KEY_AT_LEAST_32_CHARS"
      Jwt__Issuer: "BudgetPilotAPI"
      Jwt__Audience: "BudgetPilotClients"
      Jwt__ExpirationMinutes: "1440"
      Jwt__RefreshTokenExpirationDays: "7"
      Encryption__Key: "K7gNU3sdo+OL0wNhqoVWhr3g6s1xYv72ol/pe/Unols="
      CardDefaults__DefaultApr: "24.99"
      CardDefaults__DefaultMinimumPaymentPercentage: "5.00"

volumes:
  sqldata:
    name: budgetpilot-sqldata
